name: Build and Release (Windows)

on:
  push:
    branches: [main, master]
    tags: ['v*']
  pull_request:
  workflow_dispatch:

jobs:
  windows-build:
    runs-on: windows-2022
    strategy:
      fail-fast: false
      matrix:
        qt_ver: ["6.5.3"]
        qt_arch: ["win64_msvc2019_64"]
        qt_arch_install: ["msvc2019_64"]

    steps:
      - uses: actions/checkout@v4
        with: { fetch-depth: 0 }

      - name: Get Version
        shell: bash
        run: |
          VERSION=$(grep 'set.*ZSHOT_VERSION' CMakeLists.txt | sed 's/[^0-9.]*//' | sed 's/)//g')
          echo "VERSION=${VERSION}" >> $GITHUB_ENV

      - uses: jurplel/install-qt-action@v4
        with:
          version: ${{ matrix.qt_ver }}
          cache: 'true'
          target: 'desktop'
          arch: ${{ matrix.qt_arch }}
          modules: 'qtimageformats'

      - name: Configure
        run: |
          mkdir build && cd build
          cmake .. -G "Visual Studio 17 2022" -A x64 -DCMAKE_BUILD_TYPE=Release -DUSE_PORTABLE_CONFIG=ON

      - name: Compile
        working-directory: build
        run: cmake --build . --config Release --parallel

      - name: Package
        working-directory: build
        run: cpack -G ZIP

      - uses: actions/upload-artifact@v4
        with:
          name: zshot-${{ env.VERSION }}-win64-portable
          path: build/zshot-*-win64.zip

      - name: Release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          name: zshot ${{ env.VERSION }}
          files: build/zshot-*-win64.zip
