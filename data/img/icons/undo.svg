  <!-- bottom horizontal (longer) -->
  <rect x="3" y="12" width="3" height="3" fill="#FF69B4"/>
  <rect x="6" y="12" width="3" height="3" fill="#FF69B4"/>
  <rect x="9" y="12" width="3" height="3" fill="#FF69B4"/>
